<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Web Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4a7c44; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .btn { 
            background: rgba(0,0,0,0.7); 
            color: white; 
            padding: 10px; 
            border: 1px solid #555; 
            cursor: pointer; 
            pointer-events: auto; 
            margin-bottom: 5px;
        }
        .btn:hover { background: rgba(50,50,50,0.8); }
        .btn.active { background: #44a; border-color: #aaf; }
    </style>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; justify-content: center; align-items: center;">
        <div style="background: #222; padding: 30px; border: 2px solid #0cf; border-radius: 10px; text-align: center; width: 320px;">
            <h2 style="color: #0cf; margin-top: 0;">RTS WEB</h2>
            <div id="auth-forms">
                <input type="text" id="username-input" placeholder="Username" style="padding: 10px; width: 90%; border-radius: 5px; border: 1px solid #555; background: #333; color: white; margin-bottom: 10px;">
                <br>
                <input type="password" id="password-input" placeholder="Password" style="padding: 10px; width: 90%; border-radius: 5px; border: 1px solid #555; background: #333; color: white; margin-bottom: 15px;">
                <br>
                <button onclick="handleRegister()" class="btn" style="width: 100%; background: #0cf; color: black; font-weight: bold; border: none; padding: 12px;">ลงทะเบียน (สมัครบัญชีใหม่)</button>
                <button onclick="handleLogin()" class="btn" style="width: 100%; background: #444; color: white; border: none; padding: 12px; margin-top: 5px;">Login (เข้าสู่ระบบเดิม)</button>
                <button onclick="continueAsGuest()" class="btn" style="width: 100%; background: transparent; color: #aaa; border: 1px solid #555; padding: 8px; margin-top: 20px;">เล่นต่อในฐานะ Guest</button>
            </div>
        </div>
    </div>

    <div id="ui">
        <!-- Auth Panel with Logout and Register Buttons -->
        <div id="auth-panel" class="btn" style="background: rgba(0,0,0,0.8); display: flex; flex-direction: column; min-width: 250px; pointer-events: auto; padding: 10px; border: 1px solid #0cf;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 8px;">
                <span id="player-display" style="font-weight: bold; color: #0cf;">Guest</span>
                <button onclick="handleLogout()" style="background: #c00; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 12px;">Logout</button>
            </div>
            <button onclick="document.getElementById('login-overlay').style.display='flex'" style="background: #0cf; color: black; border: none; padding: 6px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%;">สมัครบัญชีใหม่ / Register</button>
        </div>
        <div id="notifications"></div>
        <div id="resources">
            🪙: <span id="res-gold">0</span> | 🪵: <span id="res-wood">0</span> | 🍖: <span id="res-food">0</span>
        </div>
        <div id="status">กำลังเชื่อมต่อ...</div>
        <div id="explore-btn" class="btn" onclick="setMode('explore')">โหมดสำรวจ</div>
        <div id="build-btn" class="btn" onclick="setMode('build')">โหมดสร้างฐาน</div>
        <div id="build-menu">
            <div id="btn-castle" class="btn" onclick="setBuildType('castle')">
                สร้างปราสาท<br>
                <small>(G:400, W:400, F:200)</small>
            </div>
            <div id="btn-tower" class="btn" onclick="setBuildType('tower')">
                สร้างป้อม<br>
                <small>(G:200, W:150, F:50)</small>
            </div>
            <div id="btn-barracks" class="btn" onclick="setBuildType('barracks')">
                สร้างค่ายทหาร<br>
                <small>(G:150, W:200, F:100)</small>
            </div>
            <div id="btn-archery_range" class="btn" onclick="setBuildType('archery_range')">
                สร้างโรงธนู<br>
                <small>(G:200, W:250, F:100)</small>
            </div>
        </div>
        <div id="admin-controls" style="display: none;">
            <div class="btn" style="background: #a44;" onclick="clearMap()">ล้างแผนที่ (Admin)</div>
        </div>
    </div>
    
    <script>
        // Admin visibility logic
        const adminId = localStorage.getItem('rts_player_id');
        if (adminId === 'Narunai') {
            document.getElementById('admin-controls').style.display = 'block';
        }
    </script>

    <div id="action-panel">
        <h3 id="panel-title">สิ่งก่อสร้าง</h3>
        <hr>
        <div id="panel-content">
            <!-- Dynamic Actions Load Here -->
        </div>
        <div class="btn" style="margin-top: 20px; width: 100%; text-align: center;" onclick="closeActionPanel()">ปิด</div>
    </div>

    <div id="unit-status-panel">
        <h3 style="color: #0cf; margin-top: 0;">สถานะยูนิต</h3>
        <hr>
        <div id="unit-stats">
            <!-- Stats load here -->
        </div>
        <div class="btn" style="margin-top: 15px; width: 100%; text-align: center; font-size: 12px;" onclick="closeUnitPanel()">ปิด</div>
    </div>

    <style>
        #unit-status-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 180px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #0cf;
            padding: 15px;
            color: white;
            display: none;
            pointer-events: auto;
            z-index: 100;
        }
        #unit-status-panel.active { display: block; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .stat-label { color: #aaa; }
    </style>

    <style>
        #action-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 220px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #555;
            padding: 15px;
            color: white;
            display: none;
            pointer-events: auto;
            z-index: 100;
        }
        #action-panel.active { display: block; }
        #panel-title { margin-top: 0; font-size: 1.1em; color: #0cf; }
        .action-btn {
            background: #333;
            border: 1px solid #777;
            color: white;
            padding: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }
        .action-btn:hover { background: #444; border-color: #0cf; }
        .action-btn small { color: #aaa; }
    <style>
        #resources { background: rgba(0,0,0,0.8); padding: 5px; margin-bottom: 5px; }
        #build-menu { display: none; margin-top: 5px; }
        #build-menu.active { display: block; }
        #notifications {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 250px;
            pointer-events: none;
            z-index: 1000;
        }
        .notification {
            background: rgba(200, 50, 50, 0.9);
            color: white;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #fff;
            animation: fadeIn 0.3s, fadeOut 0.3s 2.7s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }
    </style>
    <canvas id="gameCanvas"></canvas>

    <script src="models.js"></script>
    <script src="common.js"></script>
    <script src="auth.js"></script>
    <script src="input.js"></script>
    <script src="game.js"></script>
</body>
</html>
